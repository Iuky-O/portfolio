<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="pg" cx="40%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#FFD6E7"/>
      <stop offset="60%" stop-color="#FF85B7"/>
      <stop offset="100%" stop-color="#E8439A"/>
    </radialGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3A0"/>
      <stop offset="100%" stop-color="#FFB020"/>
    </radialGradient>
  </defs>

  <!-- 5 sakura petals rotated 72° apart -->
  <g transform="translate(16,16)">
    <ellipse cx="0" cy="-7.2" rx="4.4" ry="7" fill="url(#pg)" opacity="0.92" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7.2" rx="4.4" ry="7" fill="url(#pg)" opacity="0.92" transform="rotate(72)"/>
    <ellipse cx="0" cy="-7.2" rx="4.4" ry="7" fill="url(#pg)" opacity="0.92" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7.2" rx="4.4" ry="7" fill="url(#pg)" opacity="0.92" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7.2" rx="4.4" ry="7" fill="url(#pg)" opacity="0.92" transform="rotate(288)"/>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="4" fill="url(#cg)"/>

    <!-- Tiny stamen dots -->
    <circle cx="0"    cy="-2.2" r="0.9" fill="#fff" opacity="0.85"/>
    <circle cx="2.1"  cy="1.1"  r="0.9" fill="#fff" opacity="0.85"/>
    <circle cx="-2.1" cy="1.1"  r="0.9" fill="#fff" opacity="0.85"/>
  </g>
</svg>
